name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: wetbulb-potential
          auto-activate-base: false

      - name: Test Python pipeline
        shell: bash -el {0}
        run: pytest

      - name: Build static Python site
        shell: bash -el {0}
        run: python -m wetbulb_pipeline site --data web/public/data --out site

      - name: Check processed DB size
        shell: bash
        run: |
          test -f web/public/data/wetbulb_processed.sqlite
          size=$(stat -c%s web/public/data/wetbulb_processed.sqlite)
          test "$size" -lt 104857600
